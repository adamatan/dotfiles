# Atuin — shell history manager
# https://atuin.sh/docs/config

# Local-only — no cloud sync
auto_sync = false
update_check = false

# Search behaviour
search_mode = "fuzzy"
filter_mode = "global"          # Ctrl+R searches all history across all shells/hosts
filter_mode_shell_up_key = "session"  # Up arrow stays within current session
